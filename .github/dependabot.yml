# Dependabot will run on day 11 of each month at 02:07 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: cron
      timezone: "Europe/Berlin"
      cronjob: '25 12 15 * *'
    open-pull-requests-limit: 15
    versioning-strategy: "increase"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: cron
      timezone: "Europe/Berlin"
      cronjob: '30 12 * * *'
    open-pull-requests-limit: 15
